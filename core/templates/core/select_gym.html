<!-- templates/core/select_gym.html -->
{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Sélectionnez votre salle</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="list-group">
                            {% for gym in gyms %}
                            <button type="submit" name="gym_id" value="{{ gym.id }}" 
                                    class="list-group-item list-group-item-action">
                                <h5>{{ gym.name }}</h5>
                                <small class="text-muted">{{ gym.organization.name }}</small>
                            </button>
                            {% empty %}
                            <div class="alert alert-warning">
                                Aucun gym accessible. Contactez l'administrateur.
                            </div>
                            {% endfor %}
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
