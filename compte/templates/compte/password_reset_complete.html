{% extends "compte/auth_base.html" %}

{% block title %}SmartClub Pro · Mot de passe mis à jour{% endblock %}
{% block intro %}{% endblock %}

{% block card_content %}
  <div class="text-center space-y-4">
    <div class="mx-auto w-14 h-14 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center">
      <i class="fas fa-check text-xl"></i>
    </div>
    <h2 class="text-xl font-semibold text-slate-900">Mot de passe mis à jour</h2>
    <p class="text-sm text-slate-500">
      Votre nouveau mot de passe a bien été enregistré.
    </p>
    <a href="{% url 'compte:login' %}" class="inline-flex items-center justify-center w-full bg-[#004e92] hover:bg-[#003a6e] text-white font-semibold py-3 rounded-xl transition">
      Aller à la connexion
    </a>
  </div>
{% endblock %}
