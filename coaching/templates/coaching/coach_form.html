{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="mb-0">{{ title }}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {{ field.errors }}
                        </div>
                        {% endfor %}
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% if coach %}{% url 'coaching:detail' gym.id coach.id %}{% else %}{% url 'coaching:list' gym.id %}{% endif %}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary">{% if coach %}Modifier{% else %}Créer{% endif %}</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
