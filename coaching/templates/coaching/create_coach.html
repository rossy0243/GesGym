{% extends "base.html" %}

{% block title %}Créer coach{% endblock %}

{% block content %}
<form method="POST">
    {% csrf_token %}

    {{ form.name }}
    {{ form.phone }}
    {{ form.specialty }}

    <label>Membres assignés</label>
    {{ form.members }}

    <button type="submit" class="btn btn-primary">
        Créer coach
    </button>
</form>
{% endblock %}
