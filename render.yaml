databases:
  - name: gesgym-db-frankfurt
    plan: free
    region: frankfurt
    databaseName: gesgym
    user: gesgym

services:
  - type: web
    name: gesgym-web
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python -m gunicorn smartclub.wsgi:application --bind 0.0.0.0:$PORT --log-file - --access-logfile -
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gesgym-db-frankfurt
          property: connectionString
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_USE_X_FORWARDED_HOST
        value: "True"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "True"
      - key: DJANGO_SERVE_MEDIA
        value: "False"
      - key: B2_BUCKET_NAME
        sync: false
      - key: B2_REGION
        sync: false
      - key: B2_ENDPOINT_URL
        sync: false
      - key: B2_KEY_ID
        sync: false
      - key: B2_APPLICATION_KEY
        sync: false
      - key: B2_MEDIA_LOCATION
        value: media
      - key: B2_CUSTOM_DOMAIN
        sync: false
      - key: B2_QUERYSTRING_AUTH
        value: "False"
      - key: DJANGO_EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: DJANGO_EMAIL_HOST
        value: mail.smartclubpro.org
      - key: DJANGO_EMAIL_PORT
        value: "465"
      - key: DJANGO_EMAIL_HOST_USER
        value: noreply@smartclubpro.org
      - key: DJANGO_EMAIL_HOST_PASSWORD
        sync: false
      - key: DJANGO_EMAIL_USE_TLS
        value: "False"
      - key: DJANGO_EMAIL_USE_SSL
        value: "True"
      - key: DJANGO_DEFAULT_FROM_EMAIL
        value: noreply@smartclubpro.org
      - key: DJANGO_SERVER_EMAIL
        value: noreply@smartclubpro.org
