databases:
  - name: gesgym-db
    plan: free
    databaseName: gesgym
    user: gesgym

services:
  - type: web
    name: gesgym-web
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: python -m gunicorn smartclub.wsgi:application --bind 0.0.0.0:$PORT --log-file - --access-logfile -
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gesgym-db
          property: connectionString
      - key: DJANGO_USE_X_FORWARDED_HOST
        value: "True"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_SERVE_MEDIA
        value: "False"
