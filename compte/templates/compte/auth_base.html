{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SmartClub Pro{% endblock %}</title>
  <link rel="icon" type="image/png" href="{% static 'images/favicon-smartclub.png' %}">
  <link rel="shortcut icon" type="image/png" href="{% static 'images/favicon-smartclub.png' %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 140, 0, 0.14), transparent 32%),
        radial-gradient(circle at bottom right, rgba(0, 78, 146, 0.14), transparent 38%),
        #f8fafc;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-5">
      <a href="/" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-slate-700 transition">
        <i class="fas fa-arrow-left text-xs"></i>
        <span>Retour à l'accueil</span>
      </a>
    </div>

    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 sm:p-8">
      <div class="text-center mb-6">
        <h1 class="text-3xl font-extrabold tracking-tight">
          <span class="text-[#FF8C00]">SmartClub</span>
          <span class="text-[#004e92]">Pro</span>
        </h1>
        <p class="text-slate-500 mt-2 text-sm">{% block intro %}{% endblock %}</p>
      </div>

      {% if messages %}
        <div class="space-y-3 mb-4">
          {% for message in messages %}
            <div class="rounded-2xl px-4 py-3 text-sm {% if message.tags == 'success' %}bg-emerald-50 text-emerald-700 border border-emerald-100{% elif message.tags == 'error' %}bg-red-50 text-red-700 border border-red-100{% else %}bg-slate-50 text-slate-700 border border-slate-100{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block card_content %}{% endblock %}
    </div>
  </div>
</body>
</html>
