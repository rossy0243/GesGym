{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0">Désactiver le coach</h3>
                </div>
                <div class="card-body">
                    <p>Désactiver "{{ coach.name }}" ?</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'coaching:detail' coach.id %}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-danger">Désactiver</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
